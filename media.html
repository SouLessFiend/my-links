<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Panel</title>
    
    <!-- Защита от поиска несуществующей иконки -->
    <link rel="icon" href="data:,">

    <!-- Подключаем твой локальный файл библиотеки Supabase -->
    <script src="supabase.js"></script>
    
    <script>
        // НАСТРОЙКА SUPABASE
        const SUPABASE_URL = 'https://ikgyzuuybdqpaqnnkoxa.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_3hjVfXObGBdFUayB-a5qMA_XG-4iB-Y83Vj';
        
        // Создаем клиент через локальный скрипт
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        window._supabase = _supabase;
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
        }
        .nav-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .nav-item, .cat-btn, button {
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .nav-item.active, .cat-btn.active {
            background: #007bff;
        }
        .page-section {
            display: none;
        }
        .page-section.active {
            display: block;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #222;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-field {
            padding: 8px;
            background: #333;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
        }
        .user-info-block {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-avatar {
            width: 30px; height: 30px;
            background: #007bff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Навигация -->
        <div class="nav-bar">
            <button class="nav-item active" onclick="switchTab('videos', this)">Видео</button>
            <button class="nav-item" onclick="switchTab('settings', this)">Настройки</button>
        </div>

        <!-- Секция видео -->
        <div id="videos-section" class="page-section active">
            <h2>Панель медиа</h2>
            <p>Управление контентом для стрима.</p>
            <button onclick="openSuggestModal()">Предложить видео</button>
            <div id="authPanel" style="margin-top: 15px;">
                <button onclick="openLoginModal()">Войти</button>
            </div>
        </div>

        <!-- Секция настроек -->
        <div id="settings-section" class="page-section">
            <h2>Настройки</h2>
            <p>Параметры панели.</p>
        </div>
    </div>

    <!-- Модальное окно отправки видео -->
    <div id="suggestModal" class="modal">
        <div class="modal-content">
            <h3>Предложить видео</h3>
            <input type="text" class="input-field" placeholder="Вставьте ссылку на видео...">
            <select class="input-field">
                <option value="fun">Смешное</option>
                <option value="music">Музыка</option>
                <option value="other">Другое</option>
            </select>
            <button onclick="sendVideo()">Отправить</button>
            <button onclick="closeModal('suggestModal')">Закрыть</button>
        </div>
    </div>

    <!-- Модальное окно входа -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3>Вход по нику Twitch</h3>
            <input type="text" id="twitchNickInput" class="input-field" placeholder="Ваш ник...">
            <button onclick="simulateLogin()">Войти</button>
            <button onclick="closeModal('loginModal')">Закрыть</button>
        </div>
    </div>

    <script>
        function switchTab(tabName, clickedTab) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelectorAll('.page-section').forEach(section => section.classList.remove('active'));
            
            clickedTab.classList.add('active');
            const targetSection = document.getElementById(`${tabName}-section`);
            if (targetSection) targetSection.classList.add('active');
        }

        function openSuggestModal() { 
            const modal = document.getElementById('suggestModal');
            if (modal) modal.style.display = 'flex'; 
        }
        
        function openLoginModal() { 
            const modal = document.getElementById('loginModal');
            if (modal) modal.style.display = 'flex'; 
        }
        
        function closeModal(modalId) { 
            const modal = document.getElementById(modalId);
            if (modal) modal.style.display = 'none'; 
        }

        let currentTwitchUser = 'blondbane';

        function simulateLogin() {
            const input = document.getElementById('twitchNickInput');
            const nick = input ? input.value.trim() : 'Viewer';
            currentTwitchUser = nick;
            const firstLetter = nick.charAt(0).toUpperCase();
            
            const authPanel = document.getElementById('authPanel');
            if (authPanel) {
                authPanel.innerHTML = `
                    <div class="user-info-block">
                        <span style="font-size: 14px; color: #aaa; font-weight: 600;">${nick}</span>
                        <div class="user-avatar">${firstLetter}</div>
                    </div>
                `;
            }
            closeModal('loginModal');
        }

        // Отправка данных в Supabase
        async function sendVideo() {
            const inputField = document.querySelector('#suggestModal .input-field[type="text"]');
            const selectField = document.querySelector('#suggestModal select.input-field');
            
            const inputUrl = inputField ? inputField.value.trim() : '';
            const selectedCategory = selectField ? selectField.value : '';

            if (!inputUrl) {
                alert('Пожалуйста, вставь ссылку на видео!');
                return;
            }

            if (!window._supabase) {
                alert('База данных еще загружается, подожди секунду...');
                return;
            }

            const { data, error } = await window._supabase
                .from('videos')
                .insert([
                    { 
                        url: inputUrl, 
                        category: selectedCategory, 
                        username: currentTwitchUser 
                    }
                ]);

            if (error) {
                console.error('Ошибка бэкенда:', error);
                alert('Что-то пошло не так при отправке.');
            } else {
                alert('Видео успешно предложено! Оно появится в базе.');
                if (inputField) inputField.value = '';
                closeModal('suggestModal');
            }
        }
    </script>
</body>
</html>
