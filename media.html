<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Panel — Stream</title>
    <link rel="icon" href="data:,">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0e0e10; color: #efeff1; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 650px; background: #18181b; padding: 24px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); border: 1px solid #2f2f35; }
        
        /* Навигация */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 24px; border-bottom: 1px solid #2f2f35; padding-bottom: 12px; }
        .nav-item { background: #2f2f35; color: #afafb6; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .nav-item.active { background: #9146ff; color: #fff; }
        .nav-item:hover { background: #3f3f46; color: #fff; }

        .page-section { display: none; }
        .page-section.active { display: block; }

        h2 { font-size: 22px; margin-bottom: 8px; color: #fff; }
        p { color: #adadb8; font-size: 14px; margin-bottom: 20px; }

        /* Кнопки */
        .btn-primary { background: #9146ff; color: #fff; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary:hover { background: #772ce8; }
        .btn-secondary { background: #2f2f35; color: #fff; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-secondary:hover { background: #3f3f46; }

        /* Блок профиля */
        .user-block { display: flex; align-items: center; justify-content: space-between; background: #1f1f23; padding: 12px 16px; border-radius: 8px; margin-top: 20px; border: 1px solid #2f2f35; }
        .user-info-block { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 36px; height: 36px; background: #9146ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; font-size: 16px; }

        /* Модальные окна */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-box { background: #1f1f23; padding: 24px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #2f2f35; display: flex; flex-direction: column; gap: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .modal-box h3 { color: #fff; font-size: 18px; }
        
        .input-field { width: 100%; padding: 10px 14px; background: #121214; border: 1px solid #2f2f35; color: #fff; border-radius: 6px; font-size: 14px; outline: none; transition: 0.2s; }
        .input-field:focus { border-color: #9146ff; }
        
        select.input-field { cursor: pointer; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Навигация -->
        <div class="nav-tabs">
            <button class="nav-item active" onclick="switchTab('videos', this)">Видео</button>
            <button class="nav-item" onclick="switchTab('settings', this)">Настройки</button>
        </div>

        <!-- Секция видео -->
        <div id="videos-section" class="page-section active">
            <h2>Панель медиаконтента</h2>
            <p>Предлагайте видео для просмотра на стриме в реальном времени.</p>
            
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn-primary" onclick="openSuggestModal()">Предложить видео</button>
            </div>

            <div id="authPanel" class="user-block">
                <div class="user-info-block">
                    <span style="font-size: 14px; color: #adadb8;">Вы вошли как зритель:</span>
                    <strong style="color: #fff;">blondbane</strong>
                </div>
                <button class="btn-secondary" onclick="openLoginModal()" style="padding: 6px 12px; font-size: 13px;">Сменить ник</button>
            </div>
        </div>

        <!-- Секция настроек -->
        <div id="settings-section" class="page-section">
            <h2>Настройки панели</h2>
            <p>Дополнительные параметры и конфигурация стрима.</p>
        </div>
    </div>

    <!-- Модальное окно отправки видео -->
    <div id="suggestModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Предложить видео</h3>
            <input type="text" class="input-field" placeholder="Вставьте ссылку на YouTube или VK Видео...">
            <select class="input-field">
                <option value="fun">Смешное / Мем</option>
                <option value="music">Музыка</option>
                <option value="game">Игровой момент</option>
                <option value="other">Другое</option>
            </select>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeModal('suggestModal')">Отмена</button>
                <button class="btn-primary" onclick="sendVideo()">Отправить</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно входа -->
    <div id="loginModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Авторизация по нику</h3>
            <input type="text" id="twitchNickInput" class="input-field" placeholder="Введите ваш ник на Twitch...">
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeModal('loginModal')">Отмена</button>
                <button class="btn-primary" onclick="simulateLogin()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabName, clickedTab) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelectorAll('.page-section').forEach(section => section.classList.remove('active'));
            
            clickedTab.classList.add('active');
            const targetSection = document.getElementById(`${tabName}-section`);
            if (targetSection) targetSection.classList.add('active');
        }

        function openSuggestModal() { 
            document.getElementById('suggestModal').style.display = 'flex'; 
        }
        
        function openLoginModal() { 
            document.getElementById('loginModal').style.display = 'flex'; 
        }
        
        function closeModal(modalId) { 
            document.getElementById(modalId).style.display = 'none'; 
        }

        let currentTwitchUser = 'blondbane';

        function simulateLogin() {
            const input = document.getElementById('twitchNickInput');
            const nick = input ? input.value.trim() : 'Viewer';
            if (!nick) return;
            currentTwitchUser = nick;
            const firstLetter = nick.charAt(0).toUpperCase();
            
            const authPanel = document.getElementById('authPanel');
            if (authPanel) {
                authPanel.innerHTML = `
                    <div class="user-info-block">
                        <div class="user-avatar">${firstLetter}</div>
                        <div>
                            <div style="font-size: 12px; color: #adadb8;">Зритель</div>
                            <strong style="color: #fff; font-size: 14px;">${nick}</strong>
                        </div>
                    </div>
                    <button class="btn-secondary" onclick="openLoginModal()" style="padding: 6px 12px; font-size: 13px;">Сменить</button>
                `;
            }
            closeModal('loginModal');
        }

        async function sendVideo() {
            const inputField = document.querySelector('#suggestModal .input-field[type="text"]');
            const selectField = document.querySelector('#suggestModal select.input-field');
            
            const inputUrl = inputField ? inputField.value.trim() : '';
            const selectedCategory = selectField ? selectField.value : 'other';

            if (!inputUrl) {
                alert('Пожалуйста, вставь ссылку на видео!');
                return;
            }

            const SUPABASE_URL = 'https://ikgyzuuybdqpaqnnkoxa.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_3hjVfXObGBdFUayB-a5qMA_XG-4iB-Y83Vj';

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/videos`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        url: inputUrl,
                        category: selectedCategory,
                        username: currentTwitchUser
                    })
                });

                if (!response.ok) {
                    throw new Error('Ошибка сервера Supabase');
                }

                alert('Видео успешно отправлено и добавлено в базу!');
                if (inputField) inputField.value = '';
                closeModal('suggestModal');

            } catch (error) {
                console.error('Ошибка отправки:', error);
                alert('Не удалось отправить видео. Проверьте консоль.');
            }
        }
    </script>
</body>
</html>
