<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlondieMedia | Главная</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #171717;
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
        }

        /* ШАПКА САЙТА */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #262626;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: #ff4181;
            text-shadow: 0 0 10px rgba(255, 65, 129, 0.3);
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-item {
            color: #8c8c8c;
            text-decoration: none;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.2s;
            cursor: pointer;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
            letter-spacing: 0.3px;
        }

        .nav-item.active {
            color: #ff4181;
            border-bottom: 2px solid #ff4181;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .twitch-login-btn {
            background-color: #6441a5;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
            font-family: 'Montserrat', sans-serif;
        }

        .twitch-login-btn:hover {
            background-color: #7d5bbe;
        }

        .user-info-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #ff4181;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            font-size: 14px;
            box-shadow: 0 0 8px rgba(255, 65, 129, 0.4);
        }

        /* ФИЛЬТРЫ И КНОПКА ПРЕДЛОЖКИ */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .cat-btn {
            background-color: #262626;
            border: 1px solid #333;
            color: #ffffff;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            user-select: none;
            font-family: 'Montserrat', sans-serif;
        }

        .cat-btn.active {
            background-color: #ff4181;
            color: #fff;
            border-color: #ff4181;
            box-shadow: 0 0 10px rgba(255, 65, 129, 0.3);
        }

        .cat-count {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.7;
            background-color: rgba(255,255,255,0.1);
            padding: 2px 7px;
            border-radius: 10px;
        }

        .suggest-btn {
            background-color: #ff4181;
            color: #ffffff;
            border: none;
            padding: 12px 26px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 0 12px rgba(255, 65, 129, 0.2);
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.5px;
        }

        .suggest-btn:hover {
            background-color: #ff5c93;
            box-shadow: 0 0 15px rgba(255, 65, 129, 0.4);
        }

        /* КОНТЕНТНЫЕ БЛОКИ */
        .page-section {
            display: none;
        }

        .page-section.active {
            display: block;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 90px 20px;
            color: #555555;
            text-align: center;
            border: 2px dashed #262626;
            border-radius: 16px;
        }

        .empty-state-icon {
            font-size: 44px;
            margin-bottom: 15px;
            opacity: 0.4;
        }

        .empty-state-text {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        /* СЕТКА КАРТОЧЕК ВИДЕО */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .video-card {
            background-color: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-3px);
            border-color: #ff4181;
        }

        .video-thumb-container {
            position: relative;
            width: 100%;
            height: 180px;
            background-color: #000;
        }

        .video-thumb-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-badge-top {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.75);
            color: #ffcb41;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            backdrop-filter: blur(4px);
        }

        .video-badge-time {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .video-badge-duration {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
        }

        .video-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        .video-author-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .author-mini-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #ff4181;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
        }

        .video-author-name {
            font-size: 13px;
            color: #aaa;
            font-weight: 600;
        }

        .video-likes-badge {
            background-color: rgba(255, 165, 0, 0.15);
            border: 1px solid rgba(255, 165, 0, 0.3);
            color: #ffa500;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .video-title {
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: auto;
            padding-top: 8px;
        }

        .delete-video-btn {
            background-color: transparent;
            border: 1px solid #444;
            color: #aaa;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.2s;
            font-family: 'Montserrat', sans-serif;
        }

        .delete-video-btn:hover {
            background-color: #ff4181;
            border-color: #ff4181;
            color: #fff;
        }

        /* МОДАЛЬНЫЕ ОКНА */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background-color: #212121;
            border: 1px solid #2d2d2d;
            padding: 25px;
            border-radius: 14px;
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .input-field {
            background-color: #262626;
            border: 1px solid #333;
            color: #fff;
            padding: 12px 14px;
            border-radius: 8px;
            outline: none;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
        }

        .input-field:focus {
            border-color: #ff4181;
        }

        .error-text {
            color: #ff4181;
            font-size: 13px;
            font-weight: 600;
            margin-top: -5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
        <header>
            <div class="logo-area">
                <span class="logo-text">BlondieMedia</span>
            </div>
            <div class="nav-links">
                <span class="nav-item active" onclick="switchTab('videos', this)">Видосы</span>
                <span class="nav-item" onclick="switchTab('feed', this)">Лента (Скоро)</span>
            </div>
            <div class="user-panel" id="authPanel">
                <button class="twitch-login-btn" onclick="openLoginModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle; margin-right: 2px;"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg>
                    Войти через Twitch
                </button>
            </div>
        </header>

        <!-- СЕКЦИЯ: ВИДОСЫ -->
        <div id="videos-section" class="page-section active">
            <div class="controls-row">
                <div class="categories">
                    <button class="cat-btn active" onclick="selectCategory(this)">⭐ Рекомендуем <span class="cat-count" id="recCount">0</span></button>
                    <button class="cat-btn" onclick="selectCategory(this)">Смешные <span class="cat-count" id="funnyCount">0</span></button>
                    <button class="cat-btn" onclick="selectCategory(this)">Трукрайм <span class="cat-count" id="truecrimeCount">0</span></button>
                    <button class="cat-btn" onclick="selectCategory(this)">Разоблачения <span class="cat-count" id="exposeCount">0</span></button>
                    <button class="cat-btn" onclick="selectCategory(this)">Трейлеры <span class="cat-count" id="trailerCount">0</span></button>
                    <button class="cat-btn" onclick="selectCategory(this)">Разное <span class="cat-count" id="otherCount">0</span></button>
                </div>
                <button class="suggest-btn" onclick="openSuggestModal()">
                    ПРЕДЛОЖИТЬ ВИДЕО ▶
                </button>
            </div>

            <div id="videosContainer">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">🎬</div>
                    <div class="empty-state-text">В этой категории пока ничего нет. Будь первым!</div>
                </div>
                <div class="videos-grid" id="videosGrid"></div>
            </div>
        </div>

        <!-- СЕКЦИЯ: ЛЕНТА -->
        <div id="feed-section" class="page-section">
            <div class="empty-state" style="border-style: solid;">
                <div class="empty-state-icon">📰</div>
                <div class="empty-state-text">Лента новостей находится в разработке. Здесь будут важные посты от стримера!</div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА: ПРЕДЛОЖИТЬ ВИДЕО -->
    <div class="modal-overlay" id="suggestModal">
        <div class="modal">
            <div class="modal-title">Предложить видео на стрим</div>
            <input type="text" id="suggestVideoInput" class="input-field" placeholder="Вставьте ссылку на YouTube">
            <div class="error-text" id="suggestErrorMsg"></div>
            <select class="input-field" id="suggestCategorySelect">
                <option value="rec">⭐ Рекомендуем</option>
                <option value="funny">Смешные</option>
                <option value="truecrime">Трукрайм</option>
                <option value="expose">Разоблачения</option>
                <option value="trailer">Трейлеры</option>
                <option value="other">Разное</option>
            </select>
            <div class="modal-actions" style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
                <button class="delete-video-btn" style="padding: 10px 18px;" onclick="closeModal('suggestModal')">Отмена</button>
                <button class="suggest-btn" style="padding: 10px 18px;" onclick="addVideo()">Добавить</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА: СИМУЛЯЦИЯ ВХОДА TWITCH -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal" style="max-width: 380px;">
            <div class="modal-title" style="text-align: center; color: #ff4181;">Авторизация Twitch</div>
            <p style="font-size: 13px; color: #aaa; text-align: center; line-height: 1.4;">Введите ваш никнейм для симуляции входа через Twitch API</p>
            <input type="text" id="twitchNickInput" class="input-field" placeholder="Ваш ник на Twitch" value="blondbane">
            <div class="modal-actions" style="justify-content: center; width: 100%; display: flex; gap: 10px; margin-top: 10px;">
                <button class="delete-video-btn" style="padding: 10px 18px;" onclick="closeModal('loginModal')">Отмена</button>
                <button class="suggest-btn" style="padding: 10px 18px; background-color: #6441a5;" onclick="simulateLogin()">Авторизоваться</button>
            </div>
        </div>
    </div>

    <script>
        let savedVideos = JSON.parse(localStorage.getItem('blondBaneVideos')) || [];

        function switchTab(tabName, clickedTab) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelectorAll('.page-section').forEach(section => section.classList.remove('active'));
            
            clickedTab.classList.add('active');
            document.getElementById(`${tabName}-section`).classList.add('active');
        }

        let currentCategory = '⭐ Рекомендуем';

        function selectCategory(clickedButton) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            clickedButton.classList.add('active');
            
            // Выделяем точное название категории без счётчика
            const fullText = clickedButton.textContent;
            currentCategory = fullText.substring(0, fullText.lastIndexOf(' ')).trim();
            renderVideos();
        }

        function openSuggestModal() { 
            document.getElementById('suggestErrorMsg').textContent = '';
            document.getElementById('suggestVideoInput').value = '';
            document.getElementById('suggestModal').style.display = 'flex'; 
        }

        function openLoginModal() { 
            document.getElementById('loginModal').style.display = 'flex'; 
        }
        
        function closeModal(modalId) { 
            document.getElementById(modalId).style.display = 'none'; 
        }

        function simulateLogin() {
            const nick = document.getElementById('twitchNickInput').value.trim() || 'Viewer';
            const firstLetter = nick.charAt(0).toUpperCase();
            
            const authPanel = document.getElementById('authPanel');
            authPanel.innerHTML = `
                <div class="user-info-block">
                    <span style="font-size: 14px; color: #aaa; font-weight: 600;">${nick}</span>
                    <div class="user-avatar">${firstLetter}</div>
                </div>
            `;
            closeModal('loginModal');
        }

        function getYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function addVideo() {
            const input = document.getElementById('suggestVideoInput');
            const errorMsg = document.getElementById('suggestErrorMsg');
            const categorySelect = document.getElementById('suggestCategorySelect');
            
            let url = input.value.trim();
            errorMsg.textContent = '';

            const youtubeRegex = /^(https?:\/\/)?(www\.)?(youtube\.com|youtu\.be)\/.+$/;

            if (!youtubeRegex.test(url)) {
                errorMsg.textContent = 'Это не YouTube ссылка!';
                return;
            }

            const videoId = getYouTubeId(url);
            if (!videoId) {
                errorMsg.textContent = 'Не удалось распознать ID видео';
                return;
            }

            // ПРОВЕРКА НА ДУБЛИКАТЫ
            const isDuplicate = savedVideos.some(video => video.videoId === videoId);
            if (isDuplicate) {
                errorMsg.textContent = 'Нет, типа уже нельзя, этот видеоролик был добавлен';
                return;
            }

            let title = 'Видео с YouTube';
            let author = 'YouTube';
            let duration = '0:00';

            // oEmbed для названия и автора
            try {
                const response = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.title) title = data.title;
                    if (data.author_name) author = data.author_name;
                }
            } catch (e) {
                console.log('oEmbed error');
            }

            // Точная длительность со страницы видео
            try {
                const pageRes = await fetch(`https://www.youtube.com/watch?v=${videoId}`);
                const htmlText = await pageRes.text();
                
                const durationMatch = htmlText.match(/"approxDurationMs":"(\d+)"/);
                if (durationMatch && durationMatch[1]) {
                    let totalSeconds = Math.floor(parseInt(durationMatch[1]) / 1000);
                    let mins = Math.floor(totalSeconds / 60);
                    let secs = totalSeconds % 60;
                    
                    if (mins >= 60) {
                        let hours = Math.floor(mins / 60);
                        mins = mins % 60;
                        duration = `${hours}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                    } else {
                        duration = `${mins}:${String(secs).padStart(2, '0')}`;
                    }
                }
            } catch (e) {
                console.log('Duration fetch error, using fallback');
                duration = '3:45';
            }

            const catMap = {
                'rec': '⭐ Рекомендуем',
                'funny': 'Смешные',
                'truecrime': 'Трукрайм',
                'expose': 'Разоблачения',
                'trailer': 'Трейлеры',
                'other': 'Разное'
            };

            const now = new Date();
            const dateStr = `${String(now.getDate()).padStart(2, '0')}.${String(now.getMonth() + 1).padStart(2, '0')}.${now.getFullYear()}`;

            const videoItem = {
                url: url,
                videoId: videoId,
                title: title,
                author: author,
                duration: duration,
                publishedAt: dateStr,
                category: catMap[categorySelect.value] || '⭐ Рекомендуем'
            };

            savedVideos.push(videoItem);
            localStorage.setItem('blondBaneVideos', JSON.stringify(savedVideos));

            renderVideos();
            closeModal('suggestModal');
        }

        window.deleteVideo = function(index) {
            savedVideos.splice(index, 1);
            localStorage.setItem('blondBaneVideos', JSON.stringify(savedVideos));
            renderVideos();
        }

        window.openVideoLink = function(url) {
            window.open(url, '_blank');
        }

        function renderVideos() {
            const grid = document.getElementById('videosGrid');
            const emptyState = document.getElementById('emptyState');

            // Подсчет количества видео для каждой категории
            document.getElementById('recCount').textContent = savedVideos.filter(v => v.category === '⭐ Рекомендуем').length;
            document.getElementById('funnyCount').textContent = savedVideos.filter(v => v.category === 'Смешные').length;
            document.getElementById('truecrimeCount').textContent = savedVideos.filter(v => v.category === 'Трукрайм').length;
            document.getElementById('exposeCount').textContent = savedVideos.filter(v => v.category === 'Разоблачения').length;
            document.getElementById('trailerCount').textContent = savedVideos.filter(v => v.category === 'Трейлеры').length;
            document.getElementById('otherCount').textContent = savedVideos.filter(v => v.category === 'Разное').length;

            let filtered = savedVideos.filter(v => v.category === currentCategory);

            grid.innerHTML = '';

            if (filtered.length === 0) {
                emptyState.style.display = 'flex';
            } else {
                emptyState.style.display = 'none';
                filtered.forEach((item) => {
                    let originalIndex = savedVideos.indexOf(item);
                    let thumbUrl = `https://img.youtube.com/vi/${item.videoId}/hqdefault.jpg`;
                    let authorInitial = item.author.charAt(0).toUpperCase();
                    
                    let card = document.createElement('div');
                    card.className = 'video-card';
                    card.onclick = () => openVideoLink(item.url);

                    let badgePrefix = item.category === '⭐ Рекомендуем' ? '⭐ Рекомендуем' : item.category;

                    card.innerHTML = `
                        <div class="video-thumb-container">
                            <span class="video-badge-top">${badgePrefix}</span>
                            <span class="video-badge-time">${item.publishedAt}</span>
                            <span class="video-badge-duration">${item.duration}</span>
                            <img src="${thumbUrl}" alt="Превью">
                        </div>
                        <div class="video-content">
                            <div class="video-author-row">
                                <div class="author-info">
                                    <div class="author-mini-avatar">${authorInitial}</div>
                                    <span class="video-author-name">${item.author}</span>
                                </div>
                                <div class="video-likes-badge">🔥 42</div>
                            </div>
                            <div class="video-title">${item.title}</div>
                            <div class="video-footer">
                                <button class="delete-video-btn" onclick="event.stopPropagation(); deleteVideo(${originalIndex})">Удалить</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        renderVideos();
    </script>
</body>
</html>
