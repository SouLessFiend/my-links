<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blondie Play | Видосы</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #171717;
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрируем весь контент на странице */
        }

        /* Ограничитель ширины, чтобы сайт был собран по центру */
        .container {
            width: 100%;
            max-width: 1200px; /* Оптимальная ширина для центрального блока */
            display: flex;
            flex-direction: column;
        }

        /* ШАПКА САЙТА */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #262626;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: #73b627;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-item {
            color: #8c8c8c;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: #73b627;
            border-bottom: 2px solid #73b627;
            padding-bottom: 4px;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #73b627;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #000;
            font-size: 14px;
        }

        /* ФИЛЬТРЫ И КНОПКА ПРЕДЛОЖКИ */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .cat-btn {
            background-color: #262626;
            border: 1px solid #333;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            user-select: none;
        }

        .cat-btn.active {
            background-color: #73b627;
            color: #000;
            border-color: #73b627;
        }

        .cat-count {
            font-size: 11px;
            opacity: 0.6;
            background-color: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 10px;
        }

        .cat-btn.active .cat-count {
            background-color: rgba(0,0,0,0.15);
        }

        .suggest-btn {
            background-color: #73b627;
            color: #000000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .suggest-btn:hover {
            background-color: #86d42e;
        }

        /* СОСТОЯНИЕ ПУСТОГО СПИСКА (GOLDEN СТАТУС) */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            color: #555555;
            text-align: center;
            border: 2px dashed #262626;
            border-radius: 16px;
        }

        .empty-state-icon {
            font-size: 40px;
            margin-bottom: 15px;
            opacity: 0.4;
        }

        .empty-state-text {
            font-size: 16px;
            font-weight: 500;
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background-color: #212121;
            border: 1px solid #2d2d2d;
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
        }

        .input-field {
            background-color: #262626;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            width: 100%;
        }

        .input-field:focus {
            border-color: #73b627;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        .cancel-btn {
            background-color: transparent;
            border: 1px solid #444;
            color: #aaa;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
        <header>
            <div class="logo-area">
                <span class="logo-text">BlondiePlay</span>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-item active">Видосы</a>
                <a href="#" class="nav-item">Лента (Скоро)</a>
            </div>
            <div class="user-panel">
                <span style="font-size: 14px; color: #aaa;">blondbane</span>
                <div class="user-avatar">B</div>
            </div>
        </header>

        <!-- ПАНЕЛЬ УПРАВЛЕНИЯ КАТЕГОРИЯМИ -->
        <div class="controls-row">
            <div class="categories">
                <button class="cat-btn active" onclick="selectCategory(this)">⭐ Рекомендуем</button>
                <button class="cat-btn" onclick="selectCategory(this)">Смешные <span class="cat-count">0</span></button>
                <button class="cat-btn" onclick="selectCategory(this)">Разное <span class="cat-count">0</span></button>
            </div>
            <button class="suggest-btn" onclick="openModal()">
                ПРЕДЛОЖИТЬ ВИДЕО ▶
            </button>
        </div>

        <!-- КОНТЕНТ (ПУСТОЙ СПИСОК) -->
        <div class="empty-state">
            <div class="empty-state-icon">🎬</div>
            <div class="empty-state-text">Здесь пока ничего нет. Будь первым, кто предложит видео!</div>
        </div>
    </div>

    <!-- ВСПЛЫВАЮЩЕЕ ОКНО (ПРЕДЛОЖКА) -->
    <div class="modal-overlay" id="suggestModal">
        <div class="modal">
            <div class="modal-title">Предложить видео на стрим</div>
            <input type="text" class="input-field" placeholder="Вставьте ссылку на YouTube или TikTok">
            <select class="input-field">
                <option value="funny">Смешные</option>
                <option value="other">Разное</option>
            </select>
            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeModal()">Отмена</button>
                <button class="suggest-btn" style="padding: 10px 16px;" onclick="closeModal()">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        function openModal() {
            document.getElementById('suggestModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('suggestModal').style.display = 'none';
        }

        // Переключение активной категории при клике
        function selectCategory(clickedButton) {
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            clickedButton.classList.add('active');
        }
    </script>
</body>
</html>
