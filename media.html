<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Panel</title>
    
    <link rel="icon" href="data:,">
</head>
<body style="font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px;">

    <div style="max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 10px;">
        <!-- Навигация -->
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="nav-item active" onclick="switchTab('videos', this)" style="background: #007bff; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Видео</button>
            <button class="nav-item" onclick="switchTab('settings', this)" style="background: #333; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Настройки</button>
        </div>

        <!-- Секция видео -->
        <div id="videos-section" class="page-section active" style="display: block;">
            <h2>Панель медиа</h2>
            <p>Управление контентом для стрима.</p>
            <button onclick="openSuggestModal()" style="background: #333; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Предложить видео</button>
            <div id="authPanel" style="margin-top: 15px;">
                <button onclick="openLoginModal()" style="background: #333; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Войти</button>
            </div>
        </div>

        <!-- Секция настроек -->
        <div id="settings-section" class="page-section" style="display: none;">
            <h2>Настройки</h2>
            <p>Параметры панели.</p>
        </div>
    </div>

    <!-- Модальное окно отправки видео -->
    <div id="suggestModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center;">
        <div style="background: #222; padding: 20px; border-radius: 8px; width: 300px; display: flex; flex-direction: column; gap: 10px;">
            <h3>Предложить видео</h3>
            <input type="text" class="input-field" placeholder="Вставьте ссылку на видео..." style="padding: 8px; background: #333; border: 1px solid #444; color: #fff; border-radius: 4px;">
            <select class="input-field" style="padding: 8px; background: #333; border: 1px solid #444; color: #fff; border-radius: 4px;">
                <option value="fun">Смешное</option>
                <option value="music">Музыка</option>
                <option value="other">Другое</option>
            </select>
            <button onclick="sendVideo()" style="background: #333; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Отправить</button>
            <button onclick="closeModal('suggestModal')" style="background: #333; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Закрыть</button>
        </div>
    </div>

    <!-- Модальное окно входа -->
    <div id="loginModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center;">
        <div style="background: #222; padding: 20px; border-radius: 8px; width: 300px; display: flex; flex-direction: column; gap: 10px;">
            <h3>Вход по нику Twitch</h3>
            <input type="text" id="twitchNickInput" class="input-field" placeholder="Ваш ник..." style="padding: 8px; background: #333; border: 1px solid #444; color: #fff; border-radius: 4px;">
            <button onclick="simulateLogin()" style="background: #333; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Войти</button>
            <button onclick="closeModal('loginModal')" style="background: #333; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Закрыть</button>
        </div>
    </div>

    <script>
        function switchTab(tabName, clickedTab) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                item.style.background = '#333';
            });
            document.querySelectorAll('.page-section').forEach(section => section.style.display = 'none');
            
            clickedTab.classList.add('active');
            clickedTab.style.background = '#007bff';
            const targetSection = document.getElementById(`${tabName}-section`);
            if (targetSection) targetSection.style.display = 'block';
        }

        function openSuggestModal() { 
            const modal = document.getElementById('suggestModal');
            if (modal) modal.style.display = 'flex'; 
        }
        
        function openLoginModal() { 
            const modal = document.getElementById('loginModal');
            if (modal) modal.style.display = 'flex'; 
        }
        
        function closeModal(modalId) { 
            const modal = document.getElementById(modalId);
            if (modal) modal.style.display = 'none'; 
        }

        let currentTwitchUser = 'blondbane';

        function simulateLogin() {
            const input = document.getElementById('twitchNickInput');
            const nick = input ? input.value.trim() : 'Viewer';
            currentTwitchUser = nick;
            const firstLetter = nick.charAt(0).toUpperCase();
            
            const authPanel = document.getElementById('authPanel');
            if (authPanel) {
                authPanel.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 14px; color: #aaa; font-weight: 600;">${nick}</span>
                        <div style="width: 30px; height: 30px; background: #007bff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">${firstLetter}</div>
                    </div>
                `;
            }
            closeModal('loginModal');
        }

        // Прямая отправка данных в твою базу Supabase
        async function sendVideo() {
            const inputField = document.querySelector('#suggestModal .input-field[type="text"]');
            const selectField = document.querySelector('#suggestModal select.input-field');
            
            const inputUrl = inputField ? inputField.value.trim() : '';
            const selectedCategory = selectField ? selectField.value : '';

            if (!inputUrl) {
                alert('Пожалуйста, вставь ссылку на видео!');
                return;
            }

            const SUPABASE_URL = 'https://ikgyzuuybdqpaqnnkoxa.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_3hjVfXObGBdFUayB-a5qMA_XG-4iB-Y83Vj';

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/videos`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        url: inputUrl,
                        category: selectedCategory,
                        username: currentTwitchUser
                    })
                });

                if (!response.ok) {
                    throw new Error('Ошибка сервера Supabase');
                }

                alert('Видео успешно предложено! Оно появится в базе.');
                if (inputField) inputField.value = '';
                closeModal('suggestModal');

            } catch (error) {
                console.error('Ошибка отправки:', error);
                alert('Что-то пошло не так при отправке.');
            }
        }
    </script>
</body>
</html>
