<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blondie Bane | Стримы и проекты</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .profile {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #262626;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .bio {
            font-size: 14px;
            color: #8c8c8c;
            margin-bottom: 10px;
        }

        .section-title {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8c8c8c;
            margin: 25px 0 12px 0;
            width: 100%;
            max-width: 580px;
            text-align: left;
            border-bottom: 1px solid #262626;
            padding-bottom: 6px;
        }

        .links-container {
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            background-color: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
        }

        .link-card:hover {
            background-color: #222222;
            transform: translateY(-2px);
        }

        /* Стиль для кнопки доната */
        .donate-card {
            border: 1px solid #c97d14;
        }
        
        .donate-card:hover {
            background-color: #241a0e;
        }

        /* Стиль для НЕКЛИКАБЕЛЬНЫХ карточек (Проекты и Реклама) */
        .disabled-card {
            background-color: #131313;
            border: 1px dashed #262626;
            color: #666666;
            cursor: default;
        }

        .disabled-card:hover {
            background-color: #131313;
            transform: none;
        }

        .link-icon {
            font-size: 22px;
            margin-right: 15px;
        }

        .link-text {
            flex-grow: 1;
        }

        .arrow {
            color: #555;
            font-size: 18px;
        }

        .badge {
            font-size: 11px;
            text-transform: uppercase;
            background-color: #262626;
            color: #8c8c8c;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="profile">
        <!-- Аватарка ждет своего часа -->
        <img class="avatar" src="https://via.placeholder.com/150" alt="Avatar">
        <h1 class="name">Blondie Bane</h1>
        <p class="bio">Соцсети, стримеры и проекты</p>
    </div>

    <!-- БЛОК: ПОДДЕРЖКА -->
    <div class="section-title">Поддержать автора</div>
    <div class="links-container">
        <!-- DonationAlerts -->
        <a href="https://www.donationalerts.com/r/blondbane" target="_blank" class="link-card donate-card">
            <span class="link-icon">💰</span>
            <span class="link-text">DonationAlerts</span>
            <span class="arrow">→</span>
        </a>
    </div>

    <!-- БЛОК 1: СОЦСЕТИ -->
    <div class="section-title">Соцсети</div>
    <div class="links-container">
        <!-- Twitch -->
        <a href="https://www.twitch.tv/blondbane" target="_blank" class="link-card">
            <span class="link-icon">🔮</span>
            <span class="link-text">Twitch-канал</span>
            <span class="arrow">→</span>
        </a>

        <!-- Telegram -->
        <a href="https://t.me/goblondbane" target="_blank" class="link-card">
            <span class="link-icon">✈️</span>
            <span class="link-text">Telegram</span>
            <span class="arrow">→</span>
        </a>

        <!-- YouTube -->
        <a href="https://www.youtube.com/@BlondBane" target="_blank" class="link-card">
            <span class="link-icon">🟥</span>
            <span class="link-text">YouTube</span>
            <span class="arrow">→</span>
        </a>

        <!-- Discord -->
        <a href="https://discord.gg/56qHXFthJB" target="_blank" class="link-card">
            <span class="link-icon">💬</span>
            <span class="link-text">Discord-сервер</span>
            <span class="arrow">→</span>
        </a>

        <!-- TikTok -->
        <a href="https://www.tiktok.com/@blondbane?_r=1&_t=ZT-98BZ3OSyH6r" target="_blank" class="link-card">
            <span class="link-icon">📱</span>
            <span class="link-text">TikTok</span>
            <span class="arrow">→</span>
        </a>
    </div>

    <!-- БЛОК 2: ПРОЕКТЫ -->
    <div class="section-title">Проекты и реклама</div>
    <div class="links-container">
        <!-- Мерч (Некликабельный) -->
        <div class="link-card disabled-card">
            <span class="link-icon">👕</span>
            <span class="link-text">Фирменный мерч</span>
            <span class="badge">В разработке</span>
        </div>
        
        <!-- Реклама (Некликабельный) -->
        <div class="link-card disabled-card">
            <span class="link-icon">💼</span>
            <span class="link-text">Сотрудничество и реклама</span>
            <span class="badge">Скоро</span>
        </div>
    </div>

</body>
</html>
