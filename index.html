<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlondBane | Стримы и проекты</title>
    <!-- FontAwesome для точных иконок соцсетей -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Шапка: Аватар и Имя */
        .profile {
            text-align: center;
            margin-bottom: 15px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 8px;
            border: 2px solid #333;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .nickname {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 15px;
        }

        /* Быстрые иконки под ником */
        .quick-icons {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        .quick-icons a {
            color: #ffffff;
            font-size: 22px;
            text-decoration: none;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .quick-icons a:hover {
            color: #88cc00;
            transform: translateY(-2px);
        }

        /* Большие карточки-баннеры с зеленой рамкой */
        .banner-card {
            width: 100%;
            background-color: #222222;
            border: 1px solid #7cb342;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 18px;
            text-decoration: none;
            color: #ffffff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .banner-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(124, 179, 66, 0.15);
        }

        .banner-img {
            width: 65px;
            height: 65px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            font-size: 30px;
        }

        .banner-content {
            display: flex;
            flex-direction: column;
        }

        .banner-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .banner-desc {
            font-size: 13px;
            color: #aaaaaa;
            line-height: 1.35;
        }

        /* Разделитель со знаком бесконечности */
        .divider {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            color: #888888;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #333333;
        }

        .divider span {
            padding: 0 15px;
            font-size: 18px;
            line-height: 1;
        }

        /* Темные кнопки социальных сетей */
        .social-button {
            width: 100%;
            background-color: #242424;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 14px 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 15px;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .social-button:hover {
            background-color: #2c2c2c;
            border-color: #555555;
        }

        .social-button i {
            font-size: 18px;
        }

        /* Блок с промо-картинкой / банером снизу */
        .promo-section {
            width: 100%;
            text-align: center;
            margin-top: 10px;
        }

        .promo-title {
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .promo-image {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Шапка -->
        <div class="profile">
            <img class="avatar" src="https://via.placeholder.com/150" alt="BlondBane">
            <h1 class="nickname">BlondBane</h1>
        </div>

        <!-- Иконки быстрого доступа -->
        <div class="quick-icons">
            <a href="https://t.me/goblondbane" target="_blank" title="Telegram"><i class="fa-paper-plane fas"></i></a>
            <a href="https://t.me/goblondbane" target="_blank" title="Telegram Channel"><i class="fab fa-telegram"></i></a>
            <a href="https://www.tiktok.com/@blondbane" target="_blank" title="TikTok"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.twitch.tv/blondbane" target="_blank" title="Twitch"><i class="fab fa-twitch"></i></a>
        </div>

        <!-- Крупные карточки (проекты/партнеры) -->
        <a href="https://www.donationalerts.com/r/blondbane" target="_blank" class="banner-card">
            <div class="banner-img">💰</div>
            <div class="banner-content">
                <div class="banner-title">DonationAlerts - Поддержать автора</div>
                <div class="banner-desc">Прямая поддержка стрима и отправка сообщений на экран.</div>
            </div>
        </a>

        <a href="#" class="banner-card">
            <div class="banner-img">🆔</div>
            <div class="banner-content">
                <div class="banner-title">patrick.id - Hub</div>
                <div class="banner-desc">Единый хаб для всех проектов и ссылок сообщества.</div>
            </div>
        </a>

        <!-- Разделитель -->
        <div class="divider">
            <span>&infin;</span>
        </div>

        <!-- Соцсети -->
        <a href="https://t.me/goblondbane" target="_blank" class="social-button">
            <i class="fab fa-telegram"></i>
            <span>Telegram</span>
        </a>

        <a href="https://www.twitch.tv/blondbane" target="_blank" class="social-button">
            <i class="fab fa-twitch"></i>
            <span>Twitch</span>
        </a>

        <a href="https://discord.gg/56qHXFthJB" target="_blank" class="social-button">
            <i class="fab fa-discord"></i>
            <span>Discord</span>
        </a>

        <a href="https://www.tiktok.com/@blondbane" target="_blank" class="social-button">
            <i class="fab fa-tiktok"></i>
            <span>TikTok</span>
        </a>

        <a href="#" target="_blank" class="social-button">
            <i class="fas fa-play-circle"></i>
            <span>Приватка Boosty (стримы с фильмами)</span>
        </a>

        <!-- Разделитель перед медиа-блоком -->
        <div class="divider">
            <span>&infin;</span>
        </div>

        <!-- Нижний блок -->
        <div class="promo-section">
            <div class="promo-title">STREAM & COMMUNITY</div>
            <!-- Замените ссылку ниже на нужную вам арт/фото картинку -->
            <img class="promo-image" src="https://via.placeholder.com/400x600/111/fff?text=BlondBane+Poster" alt="Poster">
        </div>
    </div>

</body>
</html>
