<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SouLessFiend | Проекты и соцсети</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .profile {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #262626;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .bio {
            font-size: 14px;
            color: #8c8c8c;
        }

        .links-container {
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            background-color: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 18px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
        }

        .link-card:hover {
            background-color: #222222;
            transform: translateY(-2px);
        }

        .link-icon {
            font-size: 24px;
            margin-right: 15px;
        }

        .link-text {
            flex-grow: 1;
        }

        .arrow {
            color: #555;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="profile">
        <!-- Позже сюда можно будет вставить прямую ссылку на твою аватарку -->
        <img class="avatar" src="https://via.placeholder.com/150" alt="Avatar">
        <h1 class="name">SouLessFiend</h1>
        <p class="bio">Соцсети, стримы и проекты</p>
    </div>

    <div class="links-container">
        <!-- Кнопка Твича Дианы -->
        <a href="https://www.twitch.tv/blondbane" target="_blank" class="link-card">
            <span class="link-icon">🔮</span>
            <span class="link-text">blondbane на Twitch</span>
            <span class="arrow">→</span>
        </a>

        <!-- Твой Telegram (замени 'твой_канал' на свой юзернейм/ссылку, когда понадобится) -->
        <a href="https://t.me/твой_канал" target="_blank" class="link-card">
            <span class="link-icon">✈️</span>
            <span class="link-text">Telegram-канал</span>
            <span class="arrow">→</span>
        </a>

        <!-- Твой Twitch -->
        <a href="https://twitch.tv/soulessfiend" target="_blank" class="link-card">
            <span class="link-icon">🎮</span>
            <span class="link-text">Стримы SouLessFiend</span>
            <span class="arrow">→</span>
        </a>

        <!-- Группа VK -->
        <a href="https://vk.com/твой_паблик" target="_blank" class="link-card">
            <span class="link-icon">👥</span>
            <span class="link-text">Группа VK</span>
            <span class="arrow">→</span>
        </a>
    </div>

</body>
</html>
