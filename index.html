<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlondBane | Стримы и проекты</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* АНИМИРОВАННЫЙ КАСТОМНЫЙ ФОН */
        body {
            /* Базовый тёмный цвет */
            background-color: #08080a;
            /* Градиент, который будет переливаться */
            background: linear-gradient(135deg, #08080a, #150b24, #0b1524, #08080a);
            background-size: 400% 400%;
            /* Запуск анимации */
            animation: gradientBg 15s ease infinite;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Анимация плавного перелива фона */
        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .profile {
            text-align: center;
            margin-bottom: 30px;
            z-index: 10; /* Чтобы быть над фоном */
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.1);
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .name {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .bio {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 10px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            margin: 30px 0 15px 0;
            width: 100%;
            max-width: 580px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 8px;
            z-index: 10;
        }

        .links-container {
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            z-index: 10;
        }

        /* ИНДИКАТОР СТРИМА */
        .status-container {
            width: 100%;
            max-width: 580px;
            margin-bottom: 15px;
            z-index: 10;
        }

        .status-badge {
            background-color: rgba(26, 26, 26, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(5px); /* Размытие фона за плашкой */
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            color: #8c8c8c;
            letter-spacing: 0.5px;
            transition: all 0.4s ease;
        }

        /* СТРИМ ИДЕТ - КРАСНЫЙ НЕОН */
        .status-badge.live {
            border-color: rgba(255, 74, 74, 0.5);
            background-color: rgba(31, 18, 18, 0.7);
            color: #ff4a4a;
            box-shadow: 0 0 20px rgba(255, 74, 74, 0.2);
            animation: pulseLive 2s infinite;
        }

        @keyframes pulseLive {
            0% { box-shadow: 0 0 20px rgba(255, 74, 74, 0.2); }
            50% { box-shadow: 0 0 30px rgba(255, 74, 74, 0.4); }
            100% { box-shadow: 0 0 20px rgba(255, 74, 74, 0.2); }
        }

        /* ОБЩИЙ СТИЛЬ КНОПОК */
        .link-card {
            background-color: rgba(26, 26, 26, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(3px);
            border-radius: 14px;
            padding: 18px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        /* ЭФФЕКТ ПРИ НАВЕДЕНИИ (Поднятие) */
        .link-card:hover {
            transform: translateY(-3px);
            background-color: rgba(35, 35, 35, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
        }

        a.link-card {
            border-style: solid;
        }

        /* УНИКАЛЬНЫЕ НЕОНОВЫЕ ЭФФЕКТЫ ДЛЯ КАЖДОЙ СОЦСЕТИ */
        .donate-card:hover {
            border-color: rgba(201, 125, 20, 0.6);
            box-shadow: 0 5px 25px rgba(201, 125, 20, 0.3);
            background-color: rgba(36, 26, 14, 0.8);
        }

        .twitch-card:hover {
            border-color: rgba(145, 70, 255, 0.6);
            box-shadow: 0 5px 25px rgba(145, 70, 255, 0.3);
            background-color: rgba(25, 15, 41, 0.8);
        }

        .telegram-card:hover {
            border-color: rgba(0, 136, 204, 0.6);
            box-shadow: 0 5px 25px rgba(0, 136, 204, 0.3);
            background-color: rgba(10, 28, 41, 0.8);
        }

        .youtube-card:hover {
            border-color: rgba(255, 0, 0, 0.5);
            box-shadow: 0 5px 25px rgba(255, 0, 0, 0.25);
            background-color: rgba(36, 14, 14, 0.8);
        }

        .discord-card:hover {
            border-color: rgba(88, 101, 242, 0.6);
            box-shadow: 0 5px 25px rgba(88, 101, 242, 0.3);
            background-color: rgba(18, 20, 38, 0.8);
        }

        .tiktok-card:hover {
            border-color: rgba(0, 242, 234, 0.5);
            box-shadow: 0 5px 25px rgba(0, 242, 234, 0.25);
            background-color: rgba(14, 36, 35, 0.8);
        }

        /* НЕКЛИКАБЕЛЬНЫЕ КАРТОЧКИ (Dashed) */
        .disabled-card {
            background-color: rgba(19, 19, 19, 0.5);
            border: 1px dashed rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.3);
            cursor: default;
        }

        .disabled-card:hover {
            background-color: rgba(19, 19, 19, 0.5);
            transform: none;
            box-shadow: none;
            border-color: rgba(255, 255, 255, 0.08);
        }

        .link-icon {
            font-size: 24px;
            margin-right: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
        }

        .link-text {
            flex-grow: 1;
            letter-spacing: -0.2px;
        }

        .arrow {
            color: rgba(255, 255, 255, 0.15);
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .link-card:hover .arrow {
            color: rgba(255, 255, 255, 0.6);
            transform: translateX(3px);
        }

        .badge {
            font-size: 10px;
            text-transform: uppercase;
            background-color: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.4);
            padding: 5px 9px;
            border-radius: 7px;
            font-weight: 700;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="profile">
        <!-- Аватарка -->
        <img class="avatar" src="https://via.placeholder.com/150" alt="Avatar">
        <h1 class="name">BlondBane</h1>
        <p class="bio">Соцсети, стримы и проекты</p>
    </div>

    <!-- ТЕКУЩИЙ СТАТУС СТРИМА (Автоматический) -->
    <div class="status-container">
        <div id="twitch-status" class="status-badge">
            <span id="status-text">⚪ Проверка трансляции...</span>
        </div>
    </div>

    <!-- БЛОК: ПОДДЕРЖКА -->
    <div class="section-title">Поддержать автора</div>
    <div class="links-container">
        <!-- DonationAlerts - Золотая -->
        <a href="https://www.donationalerts.com/r/blondbane" target="_blank" class="link-card donate-card">
            <span class="link-icon">💰</span>
            <span class="link-text">DonationAlerts</span>
            <span class="arrow">→</span>
        </a>
    </div>

    <!-- БЛОК 1: СОЦСЕТИ -->
    <div class="section-title">Соцсети</div>
    <div class="links-container">
        <!-- Twitch - Фиолетовая -->
        <a href="https://www.twitch.tv/blondbane" target="_blank" class="link-card twitch-card">
            <span class="link-icon">🔮</span>
            <span class="link-text">Twitch-канал</span>
            <span class="arrow">→</span>
        </a>

        <!-- Telegram - Голубая -->
        <a href="https://t.me/goblondbane" target="_blank" class="link-card telegram-card">
            <span class="link-icon">✈️</span>
            <span class="link-text">Telegram</span>
            <span class="arrow">→</span>
        </a>

        <!-- YouTube - Красная -->
        <a href="https://www.youtube.com/@BlondBane" target="_blank" class="link-card youtube-card">
            <span class="link-icon">🟥</span>
            <span class="link-text">YouTube</span>
            <span class="arrow">→</span>
        </a>

        <!-- Discord - Синяя -->
        <a href="https://discord.gg/56qHXFthJB" target="_blank" class="link-card discord-card">
            <span class="link-icon">💬</span>
            <span class="link-text">Discord-сервер</span>
            <span class="arrow">→</span>
        </a>

        <!-- TikTok - Бирюзовая -->
        <a href="https://www.tiktok.com/@blondbane?_r=1&_t=ZT-98BZ3OSyH6r" target="_blank" class="link-card tiktok-card">
            <span class="link-icon">📱</span>
            <span class="link-text">TikTok</span>
            <span class="arrow">→</span>
        </a>
    </div>

    <!-- БЛОК 2: ПРОЕКТЫ -->
    <div class="section-title">Проекты и реклама</div>
    <div class="links-container">
        <!-- Мерч (Некликабельный) -->
        <div class="link-card disabled-card">
            <span class="link-icon">👕</span>
            <span class="link-text">Фирменный мерч</span>
            <span class="badge">В разработке</span>
        </div>
        
        <!-- Реклама (Некликабельный) -->
        <div class="link-card disabled-card">
            <span class="link-icon">💼</span>
            <span class="link-text">Сотрудничество</span>
            <span class="badge">Скоро</span>
        </div>
    </div>

    <!-- СКРИПТ ПРОВЕРКИ ОНЛАЙНА -->
    <script>
        const twitchUser = 'blondbane';
        const statusElement = document.getElementById('twitch-status');
        const textElement = document.getElementById('status-text');

        async function checkTwitchStatus() {
            try {
                const response = await fetch(`https://decapi.me/twitch/viewercount/${twitchUser}`);
                const data = await response.text();

                if (data.includes('offline') || data.includes('not live') || response.status !== 200) {
                    statusElement.classList.remove('live');
                    textElement.innerText = '⚪ Канал офлайн';
                } else {
                    const viewers = data.trim();
                    statusElement.classList.add('live');
                    textElement.innerText = `🔴 LIVE: ${viewers} зрителей`;
                }
            } catch (error) {
                statusElement.classList.remove('live');
                textElement.innerText = '⚪ Канал офлайн';
            }
        }

        checkTwitchStatus();
        setInterval(checkTwitchStatus, 60000);
    </script>

</body>
</html>
